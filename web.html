<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Web Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            line-height: 1.6;
        }

        header {
            background: #333;
            color: #fff;
            padding: 15px 0;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            margin: auto;
        }

        nav h1 {
            font-size: 24px;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
        }

        .hero {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h2 {
            font-size: 48px;
        }

        .hero p {
            margin: 15px 0;
            font-size: 18px;
        }

        .hero button {
            padding: 10px 20px;
            border: none;
            background: white;
            color: #333;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        .features {
            padding: 50px 20px;
            text-align: center;
        }

        .features h2 {
            margin-bottom: 30px;
        }

        .feature-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .feature {
            background: #f4f4f4;
            margin: 10px;
            padding: 20px;
            width: 280px;
            border-radius: 10px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .hero h2 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

<header>
    <nav>
        <h1>MyWebsite</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div>
        <h2>Welcome to My Website</h2>
        <p>Create something amazing with this modern template.</p>
        <button onclick="alert('Welcome!')">Get Started</button>
    </div>
</section>

<section class="features">
    <h2>Features</h2>
    <div class="feature-container">
        <div class="feature">
            <h3>Fast</h3>
            <p>Optimized for performance and speed.</p>
        </div>
        <div class="feature">
            <h3>Responsive</h3>
            <p>Looks great on all devices.</p>
        </div>
        <div class="feature">
            <h3>Easy</h3>
            <p>Simple and clean code structure.</p>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 MyWebsite | All Rights Reserved</p>
</footer>

</body>
</html>
